common:
  bucket_types:
    - "regional"
    - "zonal"
  file_sizes_mb:
    - 30720 # 30 GB
  block_sizes_mb:
    - 0.0625
    - 1
    - 16
  rounds: 3
  runtime: 30

scenarios:
  - name: "read_seq_fixed_duration"
    pattern: "seq"
    processes: [1, 16, 48]
    files: 1

  - name: "read_rand_fixed_duration"
    pattern: "rand"
    processes: [1, 16, 48]
    files: 1